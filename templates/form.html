<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulir Pendaftaran Mahasiswa Baru</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(180deg, #e7f3fa 0%, #b8e0d2 100%);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      flex-direction: column;
    }

    .camera-container {
      margin-bottom: 20px;
      border: 3px solid #68a7d9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    .camera-container img {
      display: block;
      width: 640px;
      height: 480px;
      object-fit: cover;
    }

    .form-container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 100%;
      padding: 35px;
      border-top: 6px solid #68a7d9;
      transition: all 0.3s ease;
    }

    h1 {
      text-align: center;
      font-size: 1.9rem;
      color: #023e8a;
      margin-bottom: 10px;
    }

    p.desc {
      text-align: center;
      color: #5a6e7f;
      margin-bottom: 25px;
      font-size: 1rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #023e8a;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 2px solid #cbe3f5;
      font-size: 1rem;
      background-color: #f9fcff;
      margin-bottom: 16px;
      transition: all 0.3s ease;
      color: #333;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #68a7d9;
      outline: none;
      background-color: #fff;
      box-shadow: 0 0 5px rgba(104, 167, 217, 0.5);
    }

    textarea {
      resize: none;
      min-height: 90px;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #68a7d9;
      color: white;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      font-weight: 600;
    }

    button:hover {
      background-color: #4a8ec4;
      transform: translateY(-2px);
    }

    .note {
      text-align: center;
      color: #67879d;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .camera-container img {
        width: 100%;
        height: auto;
      }
      .form-container {
        padding: 25px;
      }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- 📷 Kamera -->
  <div class="camera-container">
    <img src="{{ url_for('video_feed') }}" alt="Live Camera Feed">
  </div>

  <!-- 🧾 Formulir -->
  <form class="form-container" action="/submit" method="POST" aria-label="Formulir Pendaftaran Mahasiswa Baru">
    <h1>Formulir Pendaftaran Mahasiswa Baru</h1>
    <p class="desc">Silakan isi data diri Anda dengan lengkap dan benar untuk melanjutkan proses pendaftaran.</p>

    <label for="nama">Nama Lengkap</label>
    <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="contoh@email.com" required>

    <label for="tanggal_lahir">Tanggal Lahir</label>
    <input type="date" id="tanggal_lahir" name="tanggal_lahir" required>

    <label for="alamat">Alamat Lengkap</label>
    <input type="text" id="alamat" name="alamat" placeholder="Masukkan alamat tempat tinggal" required>

    <label for="pekerjaan">Pekerjaan</label>
    <input type="text" id="pekerjaan" name="pekerjaan" placeholder="Masukkan pekerjaan Anda" required>

    <label for="hobi">Hobi</label>
    <input type="text" id="hobi" name="hobi" placeholder="Masukkan hobi Anda">

    <label for="jurusan">Jurusan yang Dituju</label>
    <select id="jurusan" name="jurusan" required>
      <option value="">Pilih jurusan</option>
      <option value="Teknik Informatika">Teknik Informatika</option>
      <option value="Sistem Informasi">Sistem Informasi</option>
      <option value="Manajemen">Manajemen</option>
      <option value="Akuntansi">Akuntansi</option>
      <option value="Desain Komunikasi Visual">Desain Komunikasi Visual</option>
    </select>

    <label for="jalur">Jalur Pendaftaran</label>
    <select id="jalur" name="jalur" required>
      <option value="">Pilih jalur pendaftaran</option>
      <option value="Reguler">Reguler</option>
      <option value="Prestasi">Prestasi</option>
      <option value="Beasiswa">Beasiswa</option>
    </select>

    <label for="nama_orang_tua">Nama Orang Tua/Wali</label>
    <input type="text" id="nama_orang_tua" name="nama_orang_tua" placeholder="Nama orang tua atau wali" required>

    <label for="alamat_orang_tua">Alamat Orang Tua/Wali</label>
    <input type="text" id="alamat_orang_tua" name="alamat_orang_tua" placeholder="Alamat tempat tinggal orang tua" required>

    <label for="phone_orang_tua">Nomor Telepon Orang Tua/Wali</label>
    <input type="tel" id="phone_orang_tua" name="phone_orang_tua" placeholder="0812-xxxx-xxxx" required>

    <label for="pesan">Catatan Tambahan</label>
    <textarea id="pesan" name="pesan" placeholder="Tuliskan pesan atau keterangan tambahan di sini"></textarea>

    <button type="submit">Kirim Pendaftaran</button>
    <p class="note">Data Anda akan diproses dengan aman dan dijaga kerahasiaannya 💙</p>
  </form>

</body>
</html>
